<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню — COFFEEMOOD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4E3524;
            --accent: #C06B3E;
            --bg: #FDF5E6;
            --text: #3e2723;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .back-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            transition: 0.3s;
        }

            .back-link:hover {
                background: var(--accent);
                color: white;
            }

        /* Сетка галереи */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .drink-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

            .drink-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 15px 35px rgba(93, 64, 55, 0.2);
            }

        .drink-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-bottom: 4px solid var(--accent);
        }

        .drink-info {
            padding: 25px;
            text-align: center;
        }

            .drink-info h3 {
                margin: 0 0 10px 0;
                color: var(--primary);
                font-size: 1.4rem;
                font-family: 'Playfair Display', serif;
            }

            .drink-info p {
                font-size: 0.95rem;
                color: #795548;
                margin-bottom: 20px;
                min-height: 45px;
            }

        .price-tag {
            font-weight: bold;
            font-size: 1.3rem;
            color: white;
            background: var(--primary);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Наше Меню</h1>
    </header>

    <div class="container">
        <a href="index.html" class="back-link">← На главную</a>

        <div class="gallery">
            <div class="drink-card">
                <img src="https://images.unsplash.com/photo-1534778101976-62847782c213?auto=format&fit=crop&w=600&q=80" alt="Капучино" class="drink-image">
                <div class="drink-info">
                    <h3>Классический Капучино</h3>
                    <p>Плотная молочная пенка и насыщенный вкус арабики.</p>
                    <div class="price-tag">220₽</div>
                </div>
            </div>

            <div class="drink-card">
                <img src="https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?auto=format&fit=crop&w=600&q=80" alt="Айс Латте" class="drink-image">
                <div class="drink-info">
                    <h3>Айс Латте</h3>
                    <p>Бодрящий микс холодного молока и двойного эспрессо.</p>
                    <div class="price-tag">250₽</div>
                </div>
            </div>

            <div class="drink-card">
                <img src="https://images.unsplash.com/photo-1572442388796-11668a67e53d?auto=format&fit=crop&w=600&q=80" alt="Раф" class="drink-image">
                <div class="drink-info">
                    <h3>Лавандовый Раф</h3>
                    <p>Нежнейший сливочный десерт с ароматом лаванды.</p>
                    <div class="price-tag">320₽</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
